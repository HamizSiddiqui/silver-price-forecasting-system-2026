<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Silver Price Forecasting</title>
    <link rel="stylesheet" href="/static/dashboard.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div class="logo">
                <i data-lucide="trending-up" class="logo-icon"></i>
                <h1>Silver<span>Forecast</span></h1>
            </div>
            <div class="status-badge">
                <div class="dot pulse"></div>
                <span>Live Marketplace</span>
            </div>
        </header>

        <main>
            <!-- Top Metric Cards -->
            <section class="metrics-grid">
                <div class="metric-card gold">
                    <div class="card-info">
                        <h3>Current Price</h3>
                        <p id="current-price">Loading...</p>
                    </div>
                    <i data-lucide="coins" class="card-icon"></i>
                </div>
                <div class="metric-card silver">
                    <div class="card-info">
                        <h3>Predicted Price (24h)</h3>
                        <p id="predicted-price">Loading...</p>
                    </div>
                    <i data-lucide="brain-circuit" class="card-icon"></i>
                </div>
                <div class="metric-card info">
                    <div class="card-info">
                        <h3>Dataset Status</h3>
                        <p id="training-time">Loading...</p>
                    </div>
                    <i data-lucide="database" class="card-icon"></i>
                </div>
            </section>

            <!-- Unit Selector -->
            <div class="controls-bar">
                <div class="unit-selector">
                    <button class="btn active" onclick="setUnit('tola')">Per Tola</button>
                    <button class="btn" onclick="setUnit('gram')">Per Gram</button>
                    <button class="btn" onclick="setUnit('kg')">Per Kilogram</button>
                </div>
            </div>

            <!-- Graph Area -->
            <section class="graph-section">
                <div class="graph-header">
                    <h2>Market Forecast Trend</h2>
                </div>
                <div class="graph-wrapper">
                    <!-- Embed the raw Plotly graph generated by visualize.py -->
                    <iframe id="forecast-iframe" src="/graph" frameborder="0"></iframe>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Silver Forecast System | Auto-retrained daily on GitHub</p>
        </footer>
    </div>

    <!-- Initialize Lucide icons -->
    <script>
        lucide.createIcons();
    </script>
    <script src="/static/dashboard.js"></script>
</body>
</html>
