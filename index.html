<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silver Price Forecasting System (2026)</title>
    <link rel="stylesheet" href="/static/dashboard.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for social icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="dashboard-container">
        <!-- Professional Header -->
        <header class="top-header">
            <div class="profile-section">
                <div class="profile-text">
                    <h4 class="name">M.Hamiz Siddiqui</h4>
                    <p class="role">AI/ML ENGINEER</p>
                </div>
                <div class="social-icons">
                    <a href="https://github.com/HamizSiddiqui" target="_blank" title="GitHub"><i class="fa-brands fa-github"></i></a>
                    <a href="https://www.linkedin.com/in/muhammad-hamiz-siddiqui-b21280294" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
                </div>
            </div>
        </header>

        <!-- Main Heading -->
        <div class="main-title">
            <h1>Silver Price Forecasting System (2026)</h1>
            <p><i class="fas fa-microchip"></i> AI-powered time series prediction using Prophet</p>
        </div>

        <main>
            <!-- Metric Cards -->
            <section class="metrics-row">
                <div class="metric-card">
                    <div class="card-icon blue"><i class="fa-regular fa-clock"></i></div>
                    <div class="card-body">
                        <h2 id="training-time">Loading...</h2>
                        <span class="label">LATEST MODEL TRAINING</span>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="card-icon purple"><i class="fa-solid fa-coins"></i></div>
                    <div class="card-body">
                        <h2 id="current-price">Loading...</h2>
                        <span class="label">CURRENT SILVER PRICE</span>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="card-icon cyan"><i class="fa-solid fa-chart-line"></i></div>
                    <div class="card-body">
                        <h2 id="predicted-price">Loading...</h2>
                        <span class="label">NEXT PREDICTED FORECAST</span>
                    </div>
                </div>
            </section>

            <!-- Graph Card -->
            <section class="forecast-card">
                <div class="card-header">
                    <div class="title">
                        <i class="fa-solid fa-chart-area"></i>
                        <span>Price Trends & Forecast</span>
                    </div>
                    <div class="unit-selector">
                        <button class="btn active" onclick="setUnit('tola')">Tola</button>
                        <button class="btn" onclick="setUnit('gram')">Gram</button>
                        <button class="btn" onclick="setUnit('kg')">KG</button>
                    </div>
                </div>
                <div class="graph-box">
                    <iframe id="forecast-iframe" src="/graph" frameborder="0"></iframe>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/dashboard.js"></script>
</body>
</html>
