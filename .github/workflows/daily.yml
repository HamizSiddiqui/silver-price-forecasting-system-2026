name: Daily Retraining

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python main.py --once

      - name: Commit changes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Auto update model" || echo "No changes"
          git push

      # IMPORTANT: To trigger a new Vercel deployment when the model is updated,
      # add a VERCEL_DEPLOY_HOOK_URL secret in your repository settings.
      # You can get this URL from your Vercel Project Settings > Git > Deploy Hooks.
      - name: Trigger Vercel Deploy Hook
        if: env.VERCEL_DEPLOY_HOOK_URL != ''
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}