name: Daily Retraining

on:
  schedule:
    # Run twice daily: 8 AM and 8 PM UTC (enough for daily price updates)
    # Running too often triggers rate-limiting from the data source
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python main.py --once

      - name: Commit changes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add data/ models/ forecast_plot.html
          if git diff --cached --quiet; then
            echo "No actual data changes to commit."
          else
            git commit -m "Auto update model"
            git pull --rebase origin main
            git push
          fi

      # IMPORTANT: To trigger a new Vercel deployment when the model is updated,
      # add a VERCEL_DEPLOY_HOOK_URL secret in your repository settings.
      # You can get this URL from your Vercel Project Settings > Git > Deploy Hooks.
      - name: Trigger Vercel Deploy Hook
        if: env.VERCEL_DEPLOY_HOOK_URL != ''
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}